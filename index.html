<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNS GALAXY LIVE PREMIUM - Ultra Build</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.2.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AUeKXlq5yfwabWD2bx7HF_F4-XmEGSTS2-iEeeqDdvXFqW7dODdkrf85ZXb9UIQl9oWFWR14Vh_V4kiM&currency=USD"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { 
            background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://res.cloudinary.com/dbtf9fbl3/image/upload/v1772479879/grok_image_1772246958370_mrkeia.jpg');
            background-size: cover; background-attachment: fixed;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { color: #f472b6; border-bottom: 3px solid #f472b6; }
        @keyframes gift-float { 0% { transform: translate(-50%, 0) scale(1); opacity: 1; } 100% { transform: translate(-50%, -400px) scale(3); opacity: 0; } }
        .gift-anim { position: fixed; bottom: 30%; left: 50%; z-index: 1000; animation: gift-float 2.5s forwards; font-size: 80px; pointer-events: none; }
        .notif-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #db2777; padding: 12px 30px; border-radius: 50px; z-index: 2000; font-weight: bold; box-shadow: 0 0 20px rgba(219,39,119,0.5); }
        #remote-video { width: 100%; height: 100vh; object-fit: cover; }
        .chat-msg { background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 15px; margin-bottom: 5px; font-size: 13px; width: fit-content; }
    </style>
</head>
<body>

<div id="toast-box"></div>

<div id="auth-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center p-8 bg-black">
    <div class="text-center mb-10">
        <h1 class="text-5xl font-black text-pink-500 italic">GALAXY</h1>
        <p class="tracking-[0.5em] text-xs text-zinc-500">LIVE PREMIUM</p>
    </div>
    <div class="w-full max-w-sm space-y-4">
        <input id="reg-name" type="text" placeholder="Full Name" class="w-full bg-zinc-900 p-4 rounded-2xl outline-none border border-white/5">
        <input id="auth-email" type="email" placeholder="Email Address" class="w-full bg-zinc-900 p-4 rounded-2xl outline-none border border-white/5">
        <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-zinc-900 p-4 rounded-2xl outline-none border border-white/5">
        <button onclick="handleAuth('register')" class="w-full bg-pink-600 py-4 rounded-2xl font-bold">Create Account</button>
        <button onclick="handleAuth('login')" class="w-full border border-zinc-800 py-4 rounded-2xl font-bold text-zinc-400">Login</button>
    </div>
</div>

 <div id="app-screen" class="screen pb-24">
    <header class="p-6 flex justify-between items-center sticky top-0 z-50 glass">
        <div class="flex items-center gap-3">
            <img id="my-avatar" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full border-2 border-pink-500 object-cover">
            <div>
                <p id="my-name" class="font-bold text-sm">User</p>
                <p class="text-[10px] text-pink-400 font-bold uppercase">Online</p>
            </div>
        </div>
        <div class="bg-black/50 px-4 py-2 rounded-full border border-pink-500/20">
            <span class="text-yellow-400 font-bold text-sm">💎 <span id="my-coins">0</span></span>
        </div>
    </header>

    <div id="home-screen" class="screen p-6">
        <div class="relative">
            <input type="text" id="user-search" oninput="searchUsers()" placeholder="Search users..." class="w-full bg-white/5 p-4 pl-12 rounded-2xl outline-none border border-white/10">
            <i class="fas fa-search absolute left-5 top-5 text-zinc-500"></i>
        </div>
    </div>

    <div class="px-6 space-y-6">
        <div class="bg-gradient-to-r from-pink-900/40 to-black p-6 rounded-3xl border border-pink-500/20">
            <h2 class="font-bold text-lg mb-4">Daily Reward</h2>
            <button onclick="claimDaily()" class="bg-white text-black px-6 py-2 rounded-full font-bold text-xs">CLAIM 10 COINS</button>
        </div>

        <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Members</h3>
        <div id="user-grid" class="grid grid-cols-2 gap-4"></div>
    </div>
  </div> 

    <div id="live-screen" class="hidden fixed inset-0 z-[60] bg-black">
        <div id="remote-video"></div>
        <div class="absolute bottom-32 left-6 right-6 h-40 overflow-y-auto flex flex-col justify-end" id="chat-box"></div>
        
        <div class="absolute bottom-10 left-6 right-6 flex gap-3">
            <input id="chat-input" type="text" placeholder="Say something..." class="flex-grow bg-black/50 p-4 rounded-2xl border border-white/20 outline-none text-sm">
            <button onclick="sendChat()" class="bg-pink-600 w-14 h-14 rounded-2xl"><i class="fas fa-paper-plane"></i></button>
            <button onclick="toggleGifts()" class="bg-yellow-500 w-14 h-14 rounded-2xl"><i class="fas fa-gift"></i></button>
            <button onclick="leaveLive()" class="bg-red-600 w-14 h-14 rounded-2xl"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div id="profile-edit" class="hidden fixed inset-0 z-[70] bg-black p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">Edit Profile</h2>
            <button onclick="closeEdit()"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <div class="flex flex-col items-center mb-8">
            <img id="edit-preview" src="https://via.placeholder.com/150" class="w-28 h-28 rounded-full border-4 border-pink-600 mb-4 object-cover">
            <input type="file" id="file-input" class="hidden" onchange="uploadToCloudinary(this.files[0])">
            <button onclick="document.getElementById('file-input').click()" class="text-pink-400 text-xs font-bold uppercase">Change Photo</button>
        </div>

        <div class="space-y-4">
            <input id="up-name" type="text" placeholder="Name" class="w-full bg-zinc-900 p-4 rounded-xl outline-none">
            <textarea id="up-bio" placeholder="Bio" class="w-full bg-zinc-900 p-4 rounded-xl outline-none h-24"></textarea>
            <select id="up-gender" class="w-full bg-zinc-900 p-4 rounded-xl outline-none">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            <input id="up-country" type="text" placeholder="Country" class="w-full bg-zinc-900 p-4 rounded-xl outline-none">
            <button onclick="saveProfile()" class="w-full bg-pink-600 py-4 rounded-xl font-bold">Save Changes</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full glass h-20 flex justify-around items-center px-10 rounded-t-3xl z-50">
        <button onclick="showSection('home')" class="text-xl tab-active"><i class="fas fa-home"></i></button>
        <button onclick="startMyLive()" class="text-3xl text-pink-500"><i class="fas fa-circle-play"></i></button>
        <button onclick="openEdit()" class="text-xl"><i class="fas fa-user-circle"></i></button>
        <button onclick="showSection('wallet')" class="text-xl"><i class="fas fa-wallet"></i></button>
    </nav>
</div>
</div> 

<div id="gift-panel" class="hidden fixed inset-0 z-[100] flex items-end">
    <div class="w-full glass rounded-t-[40px] p-8 pb-12">
        <div class="grid grid-cols-4 gap-4 mb-8">
            <div onclick="sendGift('🌹', 1)" class="text-center p-2 bg-white/5 rounded-2xl">🌹 <p class="text-[10px] mt-1">1</p></div>
            <div onclick="sendGift('💋', 5)" class="text-center p-2 bg-white/5 rounded-2xl">💋 <p class="text-[10px] mt-1">5</p></div>
            <div onclick="sendGift('🎈', 10)" class="text-center p-2 bg-white/5 rounded-2xl">🎈 <p class="text-[10px] mt-1">10</p></div>
            <div onclick="sendGift('💍', 50)" class="text-center p-2 bg-white/5 rounded-2xl">💍 <p class="text-[10px] mt-1">50</p></div>
            <div onclick="sendGift('👑', 100)" class="text-center p-2 bg-white/5 rounded-2xl">👑 <p class="text-[10px] mt-1">100</p></div>
            <div onclick="sendGift('🚗', 500)" class="text-center p-2 bg-white/5 rounded-2xl">🚗 <p class="text-[10px] mt-1">500</p></div>
            <div onclick="sendGift('🚁', 1000)" class="text-center p-2 bg-white/5 rounded-2xl">🚁 <p class="text-[10px] mt-1">1k</p></div>
            <div onclick="sendGift('🦁', 5000)" class="text-center p-2 bg-white/5 rounded-2xl">🦁 <p class="text-[10px] mt-1">5k</p></div>
            <div onclick="sendGift('🚀', 10000)" class="text-center p-2 bg-white/5 rounded-2xl">🚀 <p class="text-[10px] mt-1">10k</p></div>
            <div onclick="sendGift('🏰', 25000)" class="text-center p-2 bg-white/5 rounded-2xl">🏰 <p class="text-[10px] mt-1">25k</p></div>
            <div onclick="sendGift('🦄', 50000)" class="text-center p-2 bg-white/5 rounded-2xl">🦄 <p class="text-[10px] mt-1">50k</p></div>
            <div onclick="sendGift('🌌', 99999)" class="text-center p-2 bg-white/5 rounded-2xl">🌌 <p class="text-[10px] mt-1">100k</p></div>
        </div>
        <button onclick="toggleGifts()" class="w-full text-zinc-500 font-bold uppercase text-xs">Cancel</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBwDUe5E8qRY1dbZzUQJu9eCAKBS7YSHVU", authDomain: "live-e6771.firebaseapp.com", projectId: "live-e6771", storageBucket: "live-e6771.firebasestorage.app", messagingSenderId: "570901004231", appId: "1:570901004231:web:220679cf41cf55b98023e2" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore(), client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    
    // Cloudinary Config
    const CLOUD_NAME = "dbtf9fbl3";
    const UPLOAD_PRESET = "my_profile_preset";

    let currentUser = null, localTracks = [], currentHost = null, allUsers = [];

    auth.onAuthStateChanged(user => {
        if(user) { currentUser = user; document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden'); syncData(); }
        else { document.getElementById('auth-screen').classList.remove('hidden'); }
    });

    // 1. & 2. AUTH & BONUS
    async function handleAuth(type) {
        const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value, n = document.getElementById('reg-name').value;
        try {
            if(type === 'register') {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await db.collection('profiles').doc(res.user.uid).set({ displayName: n, coins: 50, isLive: false, lastBonus: 0, photoUrl: '' });
            } else { await auth.signInWithEmailAndPassword(e, p); }
        } catch(err) { alert(err.message); }
    }

    function syncData() {
        db.collection('profiles').doc(currentUser.uid).onSnapshot(doc => {
            const d = doc.data();
            document.getElementById('my-coins').innerText = d.coins;
            document.getElementById('my-name').innerText = d.displayName;
            if(d.photoUrl) { document.getElementById('my-avatar').src = d.photoUrl; document.getElementById('edit-preview').src = d.photoUrl; }
        });
        db.collection('profiles').onSnapshot(snap => {
            allUsers = []; snap.forEach(doc => { if(doc.id !== currentUser.uid) allUsers.push({id: doc.id, ...doc.data()}); });
            renderUsers(allUsers);
        });
    }

    function renderUsers(users) {
        const grid = document.getElementById('user-grid'); grid.innerHTML = "";
        users.forEach(u => {
            grid.innerHTML += `
                <div onclick="smartClick('${u.id}')" class="relative glass p-4 rounded-[30px] text-center border border-white/5 active:scale-95 transition">
                    ${u.isLive ? '<span class="absolute top-4 right-4 bg-red-600 text-[8px] font-black px-2 py-0.5 rounded-full animate-pulse">LIVE</span>' : ''}
                    <img src="${u.photoUrl || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-full mx-auto mb-3 object-cover border-2 border-white/10">
                    <p class="text-xs font-bold truncate">${u.displayName}</p>
                </div>`;
        });
    }

    // 3. SMART CLICK
    async function smartClick(uid) {
        const doc = await db.collection('profiles').doc(uid).get();
        if(doc.data().isLive) joinLive(uid);
        else showProfile(uid);
    }

    // 13. CLOUDINARY UPLOAD
    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        toast("Uploading photo...");
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        const data = await res.json();
        await db.collection('profiles').doc(currentUser.uid).update({ photoUrl: data.secure_url });
        toast("Profile photo updated!");
    }

    // 6. AGORA LIVE
    async function startMyLive() {
        await client.join("d369ed90f2c04b599b9e680fbe3ca788", currentUser.uid, null, 0);
        localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();
        document.getElementById('live-screen').classList.remove('hidden');
        localTracks[1].play('remote-video');
        await client.publish(localTracks);
        await db.collection('profiles').doc(currentUser.uid).update({ isLive: true });
        currentHost = currentUser.uid;
    }

    async function joinLive(hostId) {
        currentHost = hostId;
        await client.join("d369ed90f2c04b599b9e680fbe3ca788", hostId, null, 0);
        document.getElementById('live-screen').classList.remove('hidden');
        client.on("user-published", async (u, type) => {
            await client.subscribe(u, type);
            if(type === 'video') u.videoTrack.play('remote-video');
            if(type === 'audio') u.audioTrack.play();
        });
        listenChat(hostId);
    }

    async function leaveLive() {
        if(localTracks.length > 0) { localTracks.forEach(t => { t.stop(); t.close(); }); }
        await client.leave();
        await db.collection('profiles').doc(currentUser.uid).update({ isLive: false });
        location.reload();
    }

    // 14. HOST REVENUE & 5. GIFTS
    async function sendGift(emoji, cost) {
        const meRef = db.collection('profiles').doc(currentUser.uid);
        const hostRef = db.collection('profiles').doc(currentHost);
        const meDoc = await meRef.get();
        if(meDoc.data().coins >= cost) {
            await meRef.update({ coins: firebase.firestore.FieldValue.increment(-cost) });
            await hostRef.update({ coins: firebase.firestore.FieldValue.increment(cost) });
            // Animation
            const a = document.createElement('div'); a.className = 'gift-anim'; a.innerText = emoji;
            document.body.appendChild(a); setTimeout(() => a.remove(), 2500);
            toggleGifts();
            toast(`Sent ${emoji} gift!`);
        } else { toast("Not enough coins!"); }
    }

    // UTILS
    function toast(m) {
        const t = document.createElement('div'); t.className = 'notif-toast'; t.innerText = m;
        document.getElementById('toast-box').appendChild(t); setTimeout(() => t.remove(), 3000);
    }
    
   function showSection(id) {
    // 1. මුලින්ම 'screen' class එක තියෙන හැම එකක්ම (home, wallet, app) හංගනවා
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));

    // 2. Navbar එක තියෙන 'app-screen' එක හැමතිස්සෙම පෙන්වන්න ඕනේ
    const app = document.getElementById('app-screen');
    if (app) app.classList.remove('hidden');

    // 3. දැන් අපිට ඕන කරන එක (home-screen හෝ wallet-screen) විතරක් පෙන්වනවා
    const target = document.getElementById(id + '-screen');
    if (target) {
        target.classList.remove('hidden');
    }

}

    function toggleGifts() { document.getElementById('gift-panel').classList.toggle('hidden'); }
    function openEdit() { document.getElementById('profile-edit').classList.remove('hidden'); }
    function closeEdit() { document.getElementById('profile-edit').classList.add('hidden'); }
    function searchUsers() {
        const term = document.getElementById('user-search').value.toLowerCase();
        renderUsers(allUsers.filter(u => u.displayName.toLowerCase().includes(term)));
    }
    async function claimDaily() {
        const ref = db.collection('profiles').doc(currentUser.uid);
        const d = await ref.get();
        if(Date.now() - (d.data().lastBonus || 0) > 86400000) {
            await ref.update({ coins: firebase.firestore.FieldValue.increment(10), lastBonus: Date.now() });
            toast("Claimed 10 coins!");
        } else toast("Come back tomorrow!");
    }
    function pay(amount, coins) {
    // කලින් තිබ්බ PayPal බටන් එක අයින් කරලා අලුත් එකක් හදනවා
    document.getElementById('paypal-button-container').innerHTML = ''; 
    
    paypal.Buttons({
        createOrder: (data, actions) => {
            return actions.order.create({
                purchase_units: [{ amount: { value: amount.toString() } }]
            });
        },
        onApprove: (data, actions) => {
            return actions.order.capture().then(details => {
                // සල්ලි ගෙව්වට පස්සේ Wallet එකට කොයින් එකතු කරනවා
                const currentCoins = parseInt(document.getElementById('my-coins').innerText) || 0;
                const newTotal = currentCoins + coins;
                
                db.collection('profiles').doc(currentUser.uid).update({ 
                    coins: newTotal 
                }).then(() => {
                    toast("Success! " + coins + " coins added.");
                    showSection('home');
                });
            });
        }
    }).render('#paypal-button-container');
}

</script>
</body>
</html>
